<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>🐱 喵喵加密文案簿 · 淡蓝清风版 🧼</title>
    <style>
        /* ========== 淡蓝 / 淡绿 清新主题 ========== */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', 'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #e0f2f1 0%, #d4eef7 100%);
            color: #1e3c4a;
            margin: 0;
            padding: 18px;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* 背景猫咪容器 (淡雅层) */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-cat {
            position: absolute;
            width: 70px;
            height: 70px;
            opacity: 0.2;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.02));
        }

        /* 主容器 柔和玻璃质感 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            padding: 1.5rem 1.8rem;
            box-shadow: 0 20px 35px -12px rgba(39, 103, 112, 0.2);
            border: 1px solid rgba(129, 199, 193, 0.6);
            transition: all 0.2s;
        }

        h1 {
            text-align: center;
            font-size: 1.9rem;
            color: #1f6d6b;
            margin: 0 0 0.5rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            font-weight: 650;
            letter-spacing: -0.2px;
        }

        /* 表单元素 */
        textarea,
        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            border: 1.5px solid #b2dfdb;
            border-radius: 1.5rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            background-color: #ffffff;
            color: #1f3b3f;
            resize: vertical;
        }

        textarea:focus,
        input[type="text"]:focus {
            border-color: #4db6ac;
            box-shadow: 0 0 0 3px rgba(77, 182, 172, 0.2);
        }

        /* 笔记区特殊样式 (淡绿调) */
        .note-input {
            border-color: #9bc1bc;
            background: #fafefc;
        }

        .note-input:focus {
            border-color: #2c7a6e;
            box-shadow: 0 0 0 3px rgba(44, 122, 110, 0.15);
        }

        /* 按钮 —— 清新抹茶/海盐色 */
        button {
            background: #57bcac;
            color: white;
            border: none;
            padding: 0.55rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(55, 145, 130, 0.2);
            backdrop-filter: blur(2px);
        }

        button:hover {
            background: #3e9b8b;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-small {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }

        .btn-edit {
            background: #5f9ea0;
            box-shadow: 0 2px 6px rgba(79, 129, 120, 0.2);
        }

        .btn-delete {
            background: #e9978f;
            box-shadow: 0 2px 6px rgba(211, 99, 89, 0.2);
        }

        .btn-view {
            background: #6a9fb5;
        }

        .btn-brown {
            background: #6d8f8c;
        }

        .btn-brown:hover {
            background: #557a76;
        }

        /* 双栏自适应 */
        .dual-pane {
            display: flex;
            gap: 1.2rem;
            margin: 0.5rem 0 0.2rem 0;
            flex-wrap: wrap;
        }

        .pane-left {
            flex: 3;
            min-width: 0;
        }

        .pane-right {
            flex: 2;
            min-width: 220px;
            display: flex;
            flex-direction: column;
        }

        /* 加密展示区 */
        .output-wrapper {
            margin-top: 1.8rem;
            background: #ebf7f4;
            border-radius: 1.8rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid #bde0db;
            box-shadow: 0 6px 14px rgba(46, 125, 112, 0.08);
        }

        .output-title {
            font-weight: 700;
            color: #2a7f6e;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .output-area {
            font-size: 1rem;
            word-break: break-word;
            background: #ffffffdb;
            padding: 1.2rem;
            border-radius: 1.5rem;
            border: 1px solid #cfe9e5;
            min-height: 150px;
            line-height: 1.7;
        }

        /* 加密样式 (横线点击解密) */
        .encrypt-para {
            margin: 0 0 12px 0;
            text-align: justify;
            line-height: 1.75;
        }

        .encrypt-para .secret-text {
            border-bottom: 2px solid #7faa9f;
            color: transparent;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            font-weight: 600;
        }

        .encrypt-para.revealed-paragraph .secret-text {
            color: #3f786d;
            border-bottom-color: #aacfc7;
            font-weight: 700;
        }

        strong {
            color: #1f6d63;
            font-weight: 700;
        }

        /* 记录卡片区 · 薄荷卡片 */
        .records-section {
            margin-top: 2.5rem;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            min-width: 150px;
        }

        .record-card {
            background: #fefef9;
            border-radius: 1.8rem;
            padding: 1.3rem;
            margin-bottom: 1.5rem;
            border: 1px solid #cae3de;
            border-left: 7px solid #65bfae;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(80, 120, 110, 0.05);
        }

        .record-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(55, 115, 100, 0.12);
            background: #ffffff;
        }

        .record-text-preview {
            color: #26534c;
            font-size: 0.92rem;
        }

        .clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-height: 4.6em;
        }

        .expand-btn {
            background: none;
            border: none;
            color: #379e8a;
            box-shadow: none;
            padding: 0;
            margin-top: 0.6rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
        }

        .expand-btn:hover {
            background: none;
            color: #1e6f60;
            text-decoration: underline;
        }

        .control-bar {
            margin-top: 1rem;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .edit-area {
            width: 100%;
            min-height: 100px;
            border-radius: 1.2rem;
            margin-bottom: 8px;
        }

        .hidden {
            display: none !important;
        }

        /* 手机适配强化 */
        @media (max-width: 680px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            .dual-pane {
                flex-direction: column;
            }

            .pane-right {
                width: 100%;
            }

            button {
                padding: 0.5rem 0.9rem;
                font-size: 0.8rem;
            }

            .output-area {
                font-size: 0.93rem;
                padding: 1rem;
            }

            .record-card {
                padding: 1rem;
            }
        }

        /* 辅助提示 */
        .current-note-badge {
            background: #e0f2ec;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            font-weight: normal;
            color: #31776b;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #4f8b80;
        }
    </style>
</head>
<body>

<div id="bg-container"></div>

<div class="container">
    <h1>🐾 喵喵加密文案簿 · 隔字加密 🧼<span style="font-size: 0.7rem; background: #cae3de30; padding: 0 8px; border-radius: 30px;">🐟 标点不计</span></h1>

    <div style="margin-bottom: 1.2rem;">
        <textarea id="mainInput" rows="4" placeholder="📝 粘贴中文段落，标点符号、数字、英文字母不计数，仅汉字每隔一个加密。试试看吧～"></textarea>
        <div style="text-align: right; margin-top: 0.7rem;">
            <button onclick="handleEncryptAndSave()">✨ 生成并保存记录 🐟</button>
        </div>
    </div>

    <div class="output-wrapper">
        <div class="output-title">
            <span>🔍 当前加密展示 <span style="font-size: 0.75rem;">(点击横线区域切换原文/密文)</span></span>
            <span id="currentNoteLabel" class="current-note-badge"></span>
        </div>

        <div class="dual-pane">
            <div class="pane-left">
                <div id="outputArea" class="output-area">
                    <span style="color: #98b9b2;">✨ 暂无内容，输入文字或点击下方记录 ✨</span>
                </div>
            </div>
            <div class="pane-right">
                <textarea id="mainNote" class="note-input" style="height: 100%; min-height: 130px;" placeholder="📘 灵感笔记 / 备忘 (自动保存)" oninput="syncMainNote()"></textarea>
            </div>
        </div>

        <div class="control-bar">
            <button class="btn-small" style="background: #63b0a2;" onclick="toggleAllInRange('outputArea', true)">👁️ 一键展示原文</button>
            <button class="btn-small" style="background: #509f8e;" onclick="toggleAllInRange('outputArea', false)">🔒 一键全部加密</button>
        </div>
    </div>

    <div class="records-section">
        <h3 style="color: #31786b; display: flex; align-items: center; gap: 8px;">📚 历史猫毛记录簿 🐈</h3>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 搜索记录内容 / 笔记..." oninput="filterRecords()">
            <button onclick="showRandomRecord()" style="white-space: nowrap;">🎲 随机翻牌</button>
        </div>
        <div id="recordsContainer"></div>
    </div>
    <footer>🐾 加密规则：仅汉字参与隔字加密，标点/数字/字母保留原文，点击任意横线段落即可切换。</footer>
</div>

<script>
    // ========== 1. 背景猫咪（淡蓝绿色调版） ==========
    const catColorsLight = ['#b2dfdb', '#c5e0de', '#cfe9e5', '#d5efe8', '#e0f2f1', '#d4eef2', '#cae3de', '#bde0db', '#dcf1ed', '#d3ebe6'];
    function initBackgroundCats() {
        const container = document.getElementById('bg-container');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < 22; i++) {
            let div = document.createElement('div');
            div.className = 'bg-cat';
            div.innerHTML = `<svg viewBox="0 0 100 100" width="70" height="70"><ellipse cx="50" cy="55" rx="38" ry="30" fill="${catColorsLight[i % catColorsLight.length]}" stroke="#4f8b80" stroke-width="1.5"/><circle cx="32" cy="44" r="4" fill="#44665e"/><circle cx="68" cy="44" r="4" fill="#44665e"/><path d="M 44 58 Q 50 65 56 58" stroke="#5c8b7c" fill="none" stroke-width="2"/><path d="M20 30 L12 20 L24 26 Z" fill="#9bbfaf"/><path d="M80 30 L88 20 L76 26 Z" fill="#9bbfaf"/></svg>`;
            div.style.left = Math.random() * 92 + 'vw';
            div.style.top = Math.random() * 92 + 'vh';
            div.style.transform = `rotate(${Math.random() * 360}deg) scale(${0.45 + Math.random() * 0.7})`;
            container.appendChild(div);
        }
    }
    window.addEventListener('DOMContentLoaded', () => {
        initBackgroundCats();
        filterRecords();
    });

    // ========== 2. 数据层 ==========
    let records = JSON.parse(localStorage.getItem('meowRecordsBlueGreen')) || [];
    let currentViewId = null;

    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 判断是否为汉字 (涵盖基本汉字区块)
    function isChineseCharacter(ch) {
        return /[\u4e00-\u9fff\u3400-\u4dbf\u{20000}-\u{2a6df}]/u.test(ch);
    }

    /**
     * 核心加密：每隔一个汉字加密 (标点符号、字母数字等不参与计数)
     * 奇数位汉字 -> 明文加粗，偶数位汉字 -> secret-text 横线隐藏
     */
    function processAlternateEncryption(paragraph) {
        if (!paragraph) return '';
        let result = '';
        let chineseCounter = 0;
        for (let i = 0; i < paragraph.length; i++) {
            const ch = paragraph[i];
            const isHan = isChineseCharacter(ch);
            if (isHan) {
                chineseCounter++;
                const escapedChar = escapeHtml(ch);
                if (chineseCounter % 2 === 1) {
                    // 明文加粗显示
                    result += `<strong>${escapedChar}</strong>`;
                } else {
                    // 加密字符，绑定点击段落切换
                    result += `<span class="secret-text" onclick="this.closest('.encrypt-para').classList.toggle('revealed-paragraph'); event.stopPropagation();" title="🐱 点击显示/隐藏">${escapedChar}</span>`;
                }
            } else {
                // 非汉字原样保留
                result += escapeHtml(ch);
            }
        }
        return result;
    }

    function generateEncryptedHTML(originalText) {
        if (!originalText || originalText.trim() === '') return '<span style="color:#a5c9c0;">（✨ 无内容）</span>';
        const lines = originalText.split(/\r?\n/);
        let html = '';
        for (let line of lines) {
            if (line.trim() === '') {
                html += '<p class="encrypt-para" style="min-height:1em;"></p>';
                continue;
            }
            const processed = processAlternateEncryption(line);
            html += `<p class="encrypt-para">${processed}</p>`;
        }
        return html;
    }

    // ========== 3. 核心功能 ==========
    function handleEncryptAndSave() {
        const text = document.getElementById('mainInput').value.trim();
        if (!text) {
            alert("🐟 先写点中文内容再保存吧～");
            return;
        }
        const newRecord = { id: Date.now(), text: text, note: "" };
        records.unshift(newRecord);
        saveToStorage();
        document.getElementById('mainInput').value = '';
        filterRecords();
        viewRecord(newRecord.id);
    }

    function saveToStorage() {
        localStorage.setItem('meowRecordsBlueGreen', JSON.stringify(records));
    }

    function viewRecord(id) {
        const record = records.find(r => r.id === id);
        if (record) {
            currentViewId = id;
            const outputDiv = document.getElementById('outputArea');
            outputDiv.innerHTML = generateEncryptedHTML(record.text);
            document.getElementById('mainNote').value = record.note || '';
            const timeTag = new Date(id).toLocaleString();
            document.getElementById('currentNoteLabel').innerHTML = `📌 正在查看 #${timeTag}`;
            document.querySelector('.output-wrapper')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    function syncMainNote() {
        if (!currentViewId) return;
        const idx = records.findIndex(r => r.id === currentViewId);
        if (idx !== -1) {
            records[idx].note = document.getElementById('mainNote').value;
            saveToStorage();
            const listNoteField = document.getElementById(`list-note-${currentViewId}`);
            if (listNoteField) listNoteField.value = records[idx].note;
        }
    }

    function showRandomRecord() {
        if (!records.length) return alert("📭 记录簿空空的，先添加一条吧~");
        const rand = records[Math.floor(Math.random() * records.length)];
        viewRecord(rand.id);
    }

    // 一键全显/全隐
    function toggleAllInRange(containerId, show) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const paras = container.querySelectorAll('.encrypt-para');
        paras.forEach(p => {
            if (show) p.classList.add('revealed-paragraph');
            else p.classList.remove('revealed-paragraph');
        });
    }

    // 记录列表渲染
    function filterRecords() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = records.filter(r => r.text.toLowerCase().includes(keyword) || (r.note && r.note.toLowerCase().includes(keyword)));
        renderRecordsList(filtered);
    }

    function renderRecordsList(list) {
        const container = document.getElementById('recordsContainer');
        if (!list.length) {
            container.innerHTML = '<div style="text-align:center; padding: 30px; color: #78aa9e;">🐾 还没有小笔记，快写一段加密文案吧～</div>';
            return;
        }
        container.innerHTML = '';
        list.forEach(record => {
            const card = document.createElement('div');
            card.className = 'record-card';
            card.id = `card-${record.id}`;
            const previewHtml = generateEncryptedHTML(record.text);
            card.innerHTML = `
                <div class="dual-pane">
                    <div class="pane-left">
                        <div class="record-text-preview clamp-3" id="preview-${record.id}">
                            ${previewHtml}
                        </div>
                        <button class="expand-btn hidden" id="expand-btn-${record.id}" onclick="toggleExpand(${record.id})">🔽 展开全文</button>
                    </div>
                    <div class="pane-right">
                        <textarea id="list-note-${record.id}" class="note-input" style="height:85px" placeholder="随文备忘..." oninput="updateNote(${record.id}, this.value)">${escapeHtml(record.note || '')}</textarea>
                    </div>
                </div>
                <div class="control-bar">
                    <button class="btn-small" style="background:#6d9f92;" onclick="toggleAllInRange('preview-${record.id}', true)">👁️ 显</button>
                    <button class="btn-small" style="background:#5c8f82;" onclick="toggleAllInRange('preview-${record.id}', false)">🔒 藏</button>
                    <div style="flex:1"></div>
                    <button class="btn-small btn-view" onclick="viewRecord(${record.id})">⬆️ 主屏查看</button>
                    <button class="btn-small btn-edit" onclick="startEdit(${record.id})">✏️ 改原文</button>
                    <button class="btn-small btn-delete" onclick="deleteRecord(${record.id})">🗑️ 丢弃</button>
                </div>
                <div id="edit-box-${record.id}" class="hidden" style="margin-top: 15px;">
                    <textarea id="edit-text-${record.id}" class="edit-area" rows="3">${escapeHtml(record.text)}</textarea>
                    <button class="btn-small" onclick="saveEdit(${record.id})">✅ 保存</button>
                    <button class="btn-small btn-delete" onclick="cancelEdit(${record.id})">❌ 取消</button>
                </div>
            `;
            container.appendChild(card);
            setTimeout(() => {
                const previewDiv = document.getElementById(`preview-${record.id}`);
                const expandBtn = document.getElementById(`expand-btn-${record.id}`);
                if (previewDiv && expandBtn && previewDiv.scrollHeight > previewDiv.clientHeight + 8) {
                    expandBtn.classList.remove('hidden');
                }
            }, 20);
        });
    }

    function toggleExpand(id) {
        const preview = document.getElementById(`preview-${id}`);
        const btn = document.getElementById(`expand-btn-${id}`);
        if (!preview || !btn) return;
        const isClamped = preview.classList.contains('clamp-3');
        preview.classList.toggle('clamp-3');
        btn.innerText = isClamped ? '🔼 收起全文' : '🔽 展开全文';
    }

    function updateNote(id, val) {
        const record = records.find(r => r.id === id);
        if (record) {
            record.note = val;
            saveToStorage();
            if (currentViewId === id) document.getElementById('mainNote').value = val;
        }
    }

    function startEdit(id) {
        const editBox = document.getElementById(`edit-box-${id}`);
        if (editBox) editBox.classList.remove('hidden');
        const previewParent = document.getElementById(`preview-${id}`)?.closest('.pane-left');
        if (previewParent) previewParent.style.opacity = '0.35';
    }

    function cancelEdit(id) {
        filterRecords();
        if (currentViewId === id) {
            const rec = records.find(r => r.id === id);
            if (rec) document.getElementById('outputArea').innerHTML = generateEncryptedHTML(rec.text);
        }
    }

    function saveEdit(id) {
        const newText = document.getElementById(`edit-text-${id}`).value;
        if (!newText.trim()) {
            alert("原文不能为空哟 🐟");
            return;
        }
        const idx = records.findIndex(r => r.id === id);
        if (idx !== -1) {
            records[idx].text = newText;
            saveToStorage();
            if (currentViewId === id) {
                document.getElementById('outputArea').innerHTML = generateEncryptedHTML(newText);
                document.getElementById('mainNote').value = records[idx].note || '';
            }
            filterRecords();
        }
    }

    function deleteRecord(id) {
        if (confirm("🐾 移除此条笔记？数据不可恢复喵。")) {
            records = records.filter(r => r.id !== id);
            saveToStorage();
            if (currentViewId === id) {
                currentViewId = null;
                document.getElementById('outputArea').innerHTML = '<span style="color:#98b9b2;">（笔记已删除）</span>';
                document.getElementById('mainNote').value = '';
                document.getElementById('currentNoteLabel').innerHTML = '';
            }
            filterRecords();
        }
    }

    // 挂载全局方法 (兼容 onclick 调用)
    window.handleEncryptAndSave = handleEncryptAndSave;
    window.viewRecord = viewRecord;
    window.syncMainNote = syncMainNote;
    window.filterRecords = filterRecords;
    window.showRandomRecord = showRandomRecord;
    window.toggleAllInRange = toggleAllInRange;
    window.toggleExpand = toggleExpand;
    window.updateNote = updateNote;
    window.startEdit = startEdit;
